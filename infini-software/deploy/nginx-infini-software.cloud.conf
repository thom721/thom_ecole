# Config Nginx déjà déployée sur le serveur (/etc/nginx/sites-available/infini-software.cloud),
# copiée ici pour qu'elle soit versionnée — pas de changement fonctionnel.
# Cette config tourne directement sur la machine hôte, PAS dans Docker : le
# backend (voir docker-compose.yml, service "backend") n'expose son port 9004
# que sur 127.0.0.1, donc ce Nginx hôte reste le seul point d'entrée public
# et le seul à terminer le TLS (certificats gérés par certbot). Port 9004
# (pas 9003) : 9003 est déjà pris par un autre projet sur ce serveur.
#
# /static/ et /ws/ : aucun code actuel dans backend/app ne sert de fichiers
# statiques ni de WebSocket — conservé tel quel pour ne pas casser un usage
# existant (ancienne version Laravel du site ? voir css/, js/, views/ à la
# racine du repo), à nettoyer séparément si confirmé inutile.

server {
    listen 443 ssl http2;
    server_name infini-software.cloud www.infini-software.cloud;

    ssl_certificate     /etc/letsencrypt/live/infini-software.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infini-software.cloud/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location /static/ {
        alias /var/www/infini-software.cloud/static/;
        expires 30d;
    }

    location /ws/ {
        proxy_pass         http://127.0.0.1:9004;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:9004/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        root /var/www/infini-software.cloud;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name infini-software.cloud www.infini-software.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
