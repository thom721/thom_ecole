# Reverse proxy nginx pour l'installation Docker (Mac/Linux), équivalent
# simplifié de configure_nginx() dans Controllers/Main_run.py (installateur
# Windows natif) : même domaine (aplekol360.local), même CA locale, mais
# proxy_pass vers host.docker.internal:9001 (port 9001 de la machine hôte) au
# lieu de 127.0.0.1 — fonctionne aussi bien quand l'API tourne nativement
# (app_gui.py) que quand elle tourne dans le conteneur "app" (mode headless,
# qui publie aussi ce port sur l'hôte). Voir docker-compose.yml, service nginx.

events {
    worker_connections 1024;
}

http {
    client_max_body_size 100m;

    server {
        listen 80;
        server_name aplekol360.local;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name aplekol360.local;

        ssl_certificate     /certs/aplekol360.local.pem;
        ssl_certificate_key /certs/aplekol360.local-key.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers           HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://host.docker.internal:9001;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
