import os
import sys
from pathlib import Path

def setup_weasyprint_dlls():
    # Déterminer le chemin du dossier contenant les DLL
    # On utilise Path(__file__) pour que ça marche peu importe où l'app est installée
    base_path = Path(__file__).parent
    gtk_bin_path = base_path / "lib" / "gtk_runtime"

    if sys.platform == "win32":
        if gtk_bin_path.exists():
            # Ajoute le dossier au moteur de recherche de DLL de Python
            os.add_dll_directory(str(gtk_bin_path.resolve()))
            # Ajoute aussi au PATH pour les dépendances plus anciennes
            os.environ['PATH'] = str(gtk_bin_path) + os.pathsep + os.environ['PATH']
            print(f"✅ DLL GTK chargées depuis : {gtk_bin_path}")
        else:
            print(f"❌ Erreur : Dossier DLL introuvable à {gtk_bin_path}")

# Appeler la fonction avant les imports de WeasyPrint
setup_weasyprint_dlls()

# Maintenant on peut importer
try:
    from weasyprint import HTML
except OSError as e:
    print("❌ Impossible de charger WeasyPrint. Vérifiez les DLL GTK.")
    print(f"Détail : {e}")

