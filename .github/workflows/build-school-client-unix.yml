name: Build school_client (Linux/macOS)

# app.py est déjà conçu pour tourner sur Mac/Linux (truststore, chemins
# AppData/.config déjà adaptés dans get_mac_address()/utils/imports.py) —
# pas besoin d'un entry point séparé comme app_gui.py pour ecole_nginx.
#
# Le job Linux tourne dans un conteneur Debian 12 "bookworm" (glibc 2.36) :
# Nuitka --standalone ne bundle jamais glibc/libm, le binaire reste lié à la
# version de la machine de compilation — voir build-ecole-nginx-unix.yml pour
# le détail (même raison, même fix).
on:
  workflow_dispatch: {}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    # manylinux_2_28 (glibc 2.28, base AlmaLinux 8) au lieu de debian:bookworm :
    # couvre Debian 10+ et Ubuntu 20.04+ au lieu de Debian 12 uniquement — même
    # base que les wheels officiels PySide6 (qui ne publient rien en-dessous).
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    defaults:
      run:
        working-directory: school_client

    steps:
      - uses: actions/checkout@v4

      - name: Installer les dépendances système
        run: |
          dnf install -y epel-release
          dnf install -y gcc gcc-c++ make patchelf ccache \
            mesa-libGL mesa-libEGL libxkbcommon xcb-util-cursor

      - name: Installer les dépendances Python
        run: |
          /opt/python/cp311-cp311/bin/python3.11 -m pip install --upgrade pip
          /opt/python/cp311-cp311/bin/python3.11 -m pip install -r requirements.txt
          echo "/opt/python/cp311-cp311/bin" >> "$GITHUB_PATH"

      - name: Build Nuitka
        run: >
          python3.11 -m nuitka app.py
          --standalone
          --enable-plugin=pyside6
          --include-qt-plugins=multimedia,platforms,imageformats
          --include-data-dir=Models=Models
          --include-data-dir=Views=Views
          --include-data-dir=Controllers=Controllers
          --include-data-dir=assets=assets
          --include-data-file=Config.py=Config.py
          --include-data-dir=Helper=Helper
          --include-data-dir=utils=utils
          --output-filename=school_client
          --output-dir=build
          --remove-output
          --nofollow-import-to=tkinter,test,unittest,pydoc
          --noinclude-qt-translation
          --assume-yes-for-downloads
          --lto=no

      - uses: actions/upload-artifact@v4
        with:
          name: school-client-linux-manylinux_2_28
          path: school_client/build/app.dist
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: school_client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: school_client/requirements.txt

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Nuitka
        run: >
          python -m nuitka app.py
          --standalone
          --enable-plugin=pyside6
          --include-qt-plugins=multimedia,platforms,imageformats
          --include-data-dir=Models=Models
          --include-data-dir=Views=Views
          --include-data-dir=Controllers=Controllers
          --include-data-dir=assets=assets
          --include-data-file=Config.py=Config.py
          --include-data-dir=Helper=Helper
          --include-data-dir=utils=utils
          --output-filename=school_client
          --output-dir=build
          --remove-output
          --nofollow-import-to=tkinter,test,unittest,pydoc
          --noinclude-qt-translation
          --assume-yes-for-downloads
          --lto=no

      - uses: actions/upload-artifact@v4
        with:
          name: school-client-macos
          path: school_client/build/app.dist
          if-no-files-found: error
