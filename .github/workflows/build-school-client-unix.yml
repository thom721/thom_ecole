name: Build school_client (Linux/macOS)

# app.py est déjà conçu pour tourner sur Mac/Linux (truststore, chemins
# AppData/.config déjà adaptés dans get_mac_address()/utils/imports.py) —
# pas besoin d'un entry point séparé comme app_gui.py pour ecole_nginx.
#
# Le job Linux tourne dans un conteneur Debian 12 "bookworm" (glibc 2.36) :
# Nuitka --standalone ne bundle jamais glibc/libm, le binaire reste lié à la
# version de la machine de compilation — voir build-ecole-nginx-unix.yml pour
# le détail (même raison, même fix).
#
# PAS manylinux_2_28 (glibc 2.28) : PySide6==6.10.0 ne publie aucun wheel
# Linux en dessous de manylinux_2_34 (glibc 2.34) — vérifié sur PyPI. Ça
# plafonne de facto la compatibilité à Debian 12+ / Ubuntu 22.04+, quel que
# soit le conteneur choisi.
on:
  workflow_dispatch: {}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    defaults:
      run:
        working-directory: school_client

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python et dépendances système
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3 python3-pip python3-venv python3-dev build-essential \
            libgl1 libegl1 libxkbcommon0 libxcb-cursor0 patchelf ccache ca-certificates

      - name: Installer les dépendances Python
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install --break-system-packages -r requirements.txt

      - name: Build Nuitka
        run: >
          python3 -m nuitka app.py
          --standalone
          --enable-plugin=pyside6
          --include-qt-plugins=multimedia,platforms,imageformats
          --include-data-dir=Models=Models
          --include-data-dir=Views=Views
          --include-data-dir=Controllers=Controllers
          --include-data-dir=assets=assets
          --include-data-file=Config.py=Config.py
          --include-data-dir=Helper=Helper
          --include-data-dir=utils=utils
          --output-filename=school_client
          --output-dir=build
          --remove-output
          --nofollow-import-to=tkinter,test,unittest,pydoc
          --noinclude-qt-translation
          --assume-yes-for-downloads
          --lto=no

      - uses: actions/upload-artifact@v4
        with:
          name: school-client-linux-debian12
          path: school_client/build/app.dist
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: school_client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: school_client/requirements.txt

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Nuitka
        run: >
          python -m nuitka app.py
          --standalone
          --enable-plugin=pyside6
          --include-qt-plugins=multimedia,platforms,imageformats
          --include-data-dir=Models=Models
          --include-data-dir=Views=Views
          --include-data-dir=Controllers=Controllers
          --include-data-dir=assets=assets
          --include-data-file=Config.py=Config.py
          --include-data-dir=Helper=Helper
          --include-data-dir=utils=utils
          --output-filename=school_client
          --output-dir=build
          --remove-output
          --nofollow-import-to=tkinter,test,unittest,pydoc
          --noinclude-qt-translation
          --assume-yes-for-downloads
          --lto=no

      - uses: actions/upload-artifact@v4
        with:
          name: school-client-macos
          path: school_client/build/app.dist
          if-no-files-found: error
