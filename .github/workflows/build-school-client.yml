name: Build school_client (Windows)

# Déclenchement manuel pour commencer simple — on ajoutera un déclencheur
# automatique (tag, push sur main...) une fois le pipeline validé.
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: school_client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: school_client/requirements.txt

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Nuitka
        run: >
          python -m nuitka app.py
          --standalone --enable-plugin=pyside6
          --include-qt-plugins=multimedia,platforms,imageformats
          --include-data-dir=Models=Models
          --include-data-dir=Views=Views
          --include-data-dir=Controllers=Controllers
          --include-data-dir=assets=assets
          --include-data-file=Config.py=Config.py
          --include-data-dir=Helper=Helper
          --include-data-dir=utils=utils
          --output-filename=school_client.exe
          --output-dir=build
          --remove-output
          --nofollow-import-to=tkinter,test,unittest,pydoc
          --noinclude-qt-translation
          --windows-company-name="Infini-Sofware"
          --windows-product-name="School Client"
          --windows-product-version="1.0.0"
          --windows-file-version="1.1.0"
          --windows-file-description="Logiciel de gestion scolaire"
          --windows-icon-from-ico=assets\icons\favicon.ico
          --windows-disable-console
          --assume-yes-for-downloads
          --mingw64
          --lto=no

      - uses: actions/upload-artifact@v4
        with:
          name: school-client
          path: school_client/build/app.dist
          if-no-files-found: error
