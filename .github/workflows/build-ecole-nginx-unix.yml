name: Build ecole_nginx (Linux/macOS)

# Compile app_gui.py (mode GUI natif Mac/Linux, voir docs/ecole_nginx.md
# section 8) — différent de app.py (Windows), pas de Controllers/Helper
# Windows-only, pas de win32api/win32security. MySQL/nginx restent en Docker,
# non bundlés dans l'exécutable (app_gui.py s'attend à trouver Docker installé
# sur la machine cible).
#
# Le job Linux tourne dans un conteneur Debian 12 "bookworm" (glibc 2.36) :
# Nuitka --standalone ne bundle jamais glibc/libm, le binaire reste lié à la
# version de la machine de compilation — ubuntu-latest (24.04, glibc 2.38+)
# produirait un exécutable incompatible avec une Debian 12 cible. Compiler
# dans un conteneur basé sur la même distro que la cible garantit la
# compatibilité (et toute version égale ou plus récente de glibc).
on:
  workflow_dispatch: {}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    # manylinux_2_28 (glibc 2.28, base AlmaLinux 8) au lieu de debian:bookworm :
    # couvre Debian 10+ et Ubuntu 20.04+ au lieu de Debian 12 uniquement — même
    # base que les wheels officiels PySide6 (qui ne publient rien en-dessous).
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    defaults:
      run:
        working-directory: ecole_nginx

    steps:
      - uses: actions/checkout@v4

      - name: Installer les dépendances système
        run: |
          dnf install -y epel-release
          dnf install -y gcc gcc-c++ make patchelf ccache \
            mesa-libGL mesa-libEGL libxkbcommon xcb-util-cursor

      - name: Installer les dépendances Python
        run: |
          /opt/python/cp311-cp311/bin/python3.11 -m pip install --upgrade pip
          /opt/python/cp311-cp311/bin/python3.11 -m pip install -r requirements.txt -r requirements-gui.txt
          /opt/python/cp311-cp311/bin/python3.11 -m pip install nuitka==2.6.9
          echo "/opt/python/cp311-cp311/bin" >> "$GITHUB_PATH"

      - name: Build Nuitka
        run: >
          python3.11 -m nuitka app_gui.py
          --standalone
          --enable-plugin=pyside6
          --include-package=jinja2 --include-package=uvicorn
          --include-data-dir=app=app
          --include-data-dir=app/alembic=app/alembic
          --include-data-files=app/alembic1.ini=app/alembic1.ini
          --include-data-files=app/alembic/versions/*.py=app/alembic/versions/
          --include-data-file=app/alembic/env.py=app/alembic/env.py
          --nofollow-import-to=app.alembic
          --include-module=logging.config
          --include-data-dir=gui=gui
          --include-package-data=cryptography
          --output-filename=ecole_nginx_server
          --output-dir=build
          --remove-output
          --nofollow-import-to=tkinter,test
          --assume-yes-for-downloads
          --lto=no

      - uses: actions/upload-artifact@v4
        with:
          name: ecole-nginx-server-linux-manylinux_2_28
          path: ecole_nginx/build/app_gui.dist
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ecole_nginx

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ecole_nginx/requirements.txt
            ecole_nginx/requirements-gui.txt

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gui.txt
          pip install nuitka==2.6.9

      - name: Build Nuitka
        run: >
          python -m nuitka app_gui.py
          --standalone
          --enable-plugin=pyside6
          --include-package=jinja2 --include-package=uvicorn
          --include-data-dir=app=app
          --include-data-dir=app/alembic=app/alembic
          --include-data-files=app/alembic1.ini=app/alembic1.ini
          --include-data-files=app/alembic/versions/*.py=app/alembic/versions/
          --include-data-file=app/alembic/env.py=app/alembic/env.py
          --nofollow-import-to=app.alembic
          --include-module=logging.config
          --include-data-dir=gui=gui
          --include-package-data=cryptography
          --output-filename=ecole_nginx_server
          --output-dir=build
          --remove-output
          --nofollow-import-to=tkinter,test
          --assume-yes-for-downloads
          --lto=no

      - uses: actions/upload-artifact@v4
        with:
          name: ecole-nginx-server-macos
          path: ecole_nginx/build/app_gui.dist
          if-no-files-found: error
