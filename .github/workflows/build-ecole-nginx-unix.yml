name: Build ecole_nginx (Linux/macOS)

# Compile app_gui.py (mode GUI natif Mac/Linux, voir docs/ecole_nginx.md
# section 8) — différent de app.py (Windows), pas de Helper Windows-only, pas
# de win32api/win32security. MySQL/nginx restent en Docker, non bundlés dans
# l'exécutable (app_gui.py s'attend à trouver Docker installé sur la machine
# cible). Seule exception pour Controllers/ : education.png, utilisé par
# app/Routes/RAcademic.py (création du profil par défaut au premier compte),
# pas par l'UI desktop Windows — donc nécessaire ici aussi.
#
# Le job Linux tourne dans un conteneur Debian 12 "bookworm" (glibc 2.36) :
# Nuitka --standalone ne bundle jamais glibc/libm, le binaire reste lié à la
# version de la machine de compilation — ubuntu-latest (24.04, glibc 2.38+)
# produirait un exécutable incompatible avec une Debian 12 cible. Compiler
# dans un conteneur basé sur la même distro que la cible garantit la
# compatibilité (et toute version égale ou plus récente de glibc).
#
# PAS manylinux_2_28 (glibc 2.28) : PySide6==6.10.0 ne publie aucun wheel
# Linux en dessous de manylinux_2_34 (glibc 2.34) — vérifié sur PyPI. Ça
# plafonne de facto la compatibilité à Debian 12+ / Ubuntu 22.04+, quel que
# soit le conteneur choisi ; debian:bookworm (glibc 2.36) convient et
# correspond à la machine de test confirmée.
on:
  workflow_dispatch: {}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    defaults:
      run:
        working-directory: ecole_nginx

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python et dépendances système
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3 python3-pip python3-venv python3-dev build-essential \
            patchelf ccache ca-certificates \
            libglib2.0-0 libgl1 libegl1 libxkbcommon0 libxcb-cursor0 \
            libfontconfig1 libfreetype6 libdbus-1-3 \
            libx11-6 libxext6 libxrender1 libsm6 libice6 libxi6 \
            libxrandr2 libxcursor1 libxcomposite1 libxdamage1 libxfixes3

      - name: Installer les dépendances Python
        run: |
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install --break-system-packages -r requirements.txt -r requirements-gui.txt
          python3 -m pip install --break-system-packages nuitka==2.6.9

      - name: Compiler les migrations Alembic en .pyc (ne pas exposer le code source)
        run: python3 scripts/compile_alembic_versions.py

      - name: Build Nuitka
        run: >
          python3 -m nuitka app_gui.py
          --standalone
          --enable-plugin=pyside6
          --include-package=jinja2 --include-package=uvicorn
          --include-data-dir=app/templates=app/templates
          --include-data-file=Controllers/education.png=Controllers/education.png
          --include-data-dir=app/alembic=app/alembic
          --include-data-files=app/alembic1.ini=app/alembic1.ini
          --include-data-files=app/alembic/versions/*.pyc=app/alembic/versions/
          --include-data-file=app/alembic/env.pyc=app/alembic/env.pyc
          --nofollow-import-to=app.alembic
          --include-module=logging.config
          --include-data-dir=gui=gui
          --include-package-data=cryptography
          --include-data-file=docker-compose.yml=docker-compose.yml
          --include-data-file=docker/nginx.conf=docker/nginx.conf
          --include-data-file=docker/certgen/generate-certs.sh=docker/certgen/generate-certs.sh
          --output-filename=ecole_nginx_server
          --output-dir=build
          --remove-output
          --nofollow-import-to=tkinter,test
          --assume-yes-for-downloads
          --lto=no

      - uses: actions/upload-artifact@v4
        with:
          name: ecole-nginx-server-linux-debian12
          path: ecole_nginx/build/app_gui.dist
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ecole_nginx

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            ecole_nginx/requirements.txt
            ecole_nginx/requirements-gui.txt

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-gui.txt
          pip install nuitka==2.6.9

      - name: Compiler les migrations Alembic en .pyc (ne pas exposer le code source)
        run: python scripts/compile_alembic_versions.py

      - name: Build Nuitka
        run: >
          python -m nuitka app_gui.py
          --standalone
          --enable-plugin=pyside6
          --include-package=jinja2 --include-package=uvicorn
          --include-data-dir=app/templates=app/templates
          --include-data-file=Controllers/education.png=Controllers/education.png
          --include-data-dir=app/alembic=app/alembic
          --include-data-files=app/alembic1.ini=app/alembic1.ini
          --include-data-files=app/alembic/versions/*.pyc=app/alembic/versions/
          --include-data-file=app/alembic/env.pyc=app/alembic/env.pyc
          --nofollow-import-to=app.alembic
          --include-module=logging.config
          --include-data-dir=gui=gui
          --include-package-data=cryptography
          --include-data-file=docker-compose.yml=docker-compose.yml
          --include-data-file=docker/nginx.conf=docker/nginx.conf
          --include-data-file=docker/certgen/generate-certs.sh=docker/certgen/generate-certs.sh
          --output-filename=ecole_nginx_server
          --output-dir=build
          --remove-output
          --nofollow-import-to=tkinter,test
          --assume-yes-for-downloads
          --lto=no

      - uses: actions/upload-artifact@v4
        with:
          name: ecole-nginx-server-macos
          path: ecole_nginx/build/app_gui.dist
          if-no-files-found: error
